name: Firebase Deploy

# Trigger only when frontend-affecting files change on master.
# This avoids wasting Actions minutes on Rust-only changes (which don't
# affect the web preview) and keeps the deploy fast.
on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/firebase-deploy.yml'

# Cancel any in-progress deploy for the same ref — newer commit wins.
concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Don't deploy if the build step fails — protects the live site
    # from being overwritten with a broken build.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ============================================================
      # STEP 1: Install dependencies
      # ============================================================
      - name: Install dependencies
        run: |
          echo "::group::npm ci output"
          npm ci
          echo "::endgroup::"
          echo "✓ Dependencies installed."

      # ============================================================
      # STEP 2: TypeScript check (separate from build so TS errors
      # are caught explicitly before Vite bundling)
      # ============================================================
      - name: TypeScript type-check
        run: |
          echo "::group::tsc --noEmit output"
          npx tsc --noEmit
          echo "::endgroup::"
          echo "✓ TypeScript check passed (no type errors)."

      # ============================================================
      # STEP 3: Build frontend (runs `tsc && vite build` per package.json)
      # This MUST complete BEFORE the Firebase deploy step — otherwise
      # we'd deploy an empty/stale dist/ folder and the live site would
      # show Firebase's default welcome placeholder.
      # ============================================================
      - name: Build frontend
        run: |
          echo "::group::npm run build output"
          npm run build
          echo "::endgroup::"
          echo "✓ Frontend build completed."

      # ============================================================
      # STEP 4: Verify build output exists and is non-trivial.
      # If dist/ is empty or index.html is missing, abort the deploy
      # loudly instead of silently overwriting the live site with
      # broken/empty content.
      # ============================================================
      - name: Verify build output
        run: |
          echo "=== Checking dist/ directory ==="
          if [ ! -d dist ]; then
            echo "::error::Build did not produce a dist/ directory. Aborting deploy."
            exit 1
          fi
          if [ ! -f dist/index.html ]; then
            echo "::error::dist/index.html is missing. Aborting deploy."
            exit 1
          fi
          echo "=== dist/ contents ==="
          ls -la dist/
          echo ""
          echo "=== dist/assets/ contents (JS + CSS bundles) ==="
          ls -la dist/assets/ 2>/dev/null || echo "::error::dist/assets/ is missing — Vite build did not bundle JS/CSS."
          echo ""
          echo "=== dist/index.html content ==="
          cat dist/index.html
          echo ""
          # Sanity check: index.html must reference at least one .js asset.
          # If it doesn't, the build is broken (empty HTML shell).
          if ! grep -q 'assets/.*\.js' dist/index.html; then
            echo "::error::dist/index.html does not reference any JS bundle. Build is broken. Aborting deploy."
            exit 1
          fi
          # Sanity check: index.html must contain our app title.
          if ! grep -q 'A Collection Head Office' dist/index.html; then
            echo "::error::dist/index.html does not contain the app title. Build is broken. Aborting deploy."
            exit 1
          fi
          echo "✓ Build output verified — dist/ contains valid React app with JS bundles."

      # ============================================================
      # STEP 5: Deploy dist/ to Firebase Hosting (live production channel)
      # The `public: dist` setting in firebase.json tells Firebase which
      # local folder to upload. We verified dist/ exists and contains
      # valid content in the previous step.
      # ============================================================
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: a-collection-head-office

      # ============================================================
      # STEP 6: Post-deploy smoke test — curl the live URL and verify
      # it returns our actual React app (not the Firebase welcome page).
      # This catches deploy bugs that the action itself doesn't surface.
      # ============================================================
      - name: Smoke test live URL
        run: |
          sleep 5  # Give Firebase CDN a moment to propagate
          echo "=== Fetching live URL ==="
          LIVE_HTML=$(curl -sL --max-time 30 "https://a-collection-head-office.web.app/" || echo "")
          if [ -z "$LIVE_HTML" ]; then
            echo "::error::Live URL returned empty response. Deploy may have failed."
            exit 1
          fi
          echo "=== Live HTML first 30 lines ==="
          echo "$LIVE_HTML" | head -30
          echo ""
          # Check for our app title (proves our React app is deployed,
          # NOT the Firebase default welcome page).
          if echo "$LIVE_HTML" | grep -q "A Collection Head Office"; then
            echo "✓ SMOKE TEST PASSED: Live URL serves our React app (title found)."
          else
            echo "::error::SMOKE TEST FAILED: Live URL does NOT contain our app title."
            echo "::error::This usually means the Firebase welcome placeholder is being served."
            echo "::error::Check that firebase.json has 'public: dist' and the build step ran."
            exit 1
          fi
          # Check that a JS bundle is referenced in the HTML.
          if echo "$LIVE_HTML" | grep -q 'assets/.*\.js'; then
            echo "✓ SMOKE TEST PASSED: Live HTML references a JS bundle."
          else
            echo "::error::SMOKE TEST FAILED: Live HTML does not reference any JS bundle."
            exit 1
          fi
