stages:
  - check

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  NODE_OPTIONS: --no-deprecation

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo
    - src-tauri/target
    - node_modules

check:
  stage: check
  image: node:20
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl pkg-config libssl-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf file > /dev/null 2>&1
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal 2>&1 | tail -1
    - . "$HOME/.cargo/env"
    - npm install --no-audit --no-fund 2>&1 | tail -5
  script:
    - . "$HOME/.cargo/env"
    - echo "=== TypeScript check ===" && npx tsc --noEmit
    - echo "=== Rust compile check ===" && cargo check --manifest-path src-tauri/Cargo.toml 2>&1
    - echo "=== Vite build ===" && npm run build 2>&1 | tail -5
  only:
    - master
